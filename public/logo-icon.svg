<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.0//EN" "http://www.w3.org/TR/2001/REC-SVG-20010904/DTD/svg10.dtd">
<svg version="1.0" xmlns="http://www.w3.org/2000/svg" width="32px" height="32px" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20d2ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Simplified map location icon from converted SVG -->
  <g fill="url(#logoGradient)">
    <!-- Main location marker shape - simplified from the converted SVG -->
    <path d="M50 10 C35 10 28 25 28 40 C28 55 38 70 50 85 C62 70 72 55 72 40 C72 25 65 10 50 10 Z" />
  </g>
  
  <!-- Inner circle -->
  <circle cx="50" cy="40" r="8" fill="#0f172a" />
  <circle cx="50" cy="40" r="4" fill="url(#logoGradient)" class="pulse-anim" />
  
  <!-- Decorative ring -->
  <ellipse cx="50" cy="45" rx="35" ry="10" fill="none" stroke="url(#logoGradient)" stroke-width="2" stroke-dasharray="8 4" class="ring-spin" />
  
  <!-- Corner dots -->
  <circle cx="20" cy="25" r="2" fill="#20d2ee" class="dot-float-1" />
  <circle cx="80" cy="25" r="2" fill="#20d2ee" class="dot-float-2" />
  <circle cx="20" cy="75" r="2" fill="#20d2ee" class="dot-float-3" />
  <circle cx="80" cy="75" r="2" fill="#20d2ee" class="dot-float-4" />
  
  <style>
    @keyframes ring-spin {
      from { transform: rotate(0deg); transform-origin: 50px 45px; }
      to { transform: rotate(360deg); transform-origin: 50px 45px; }
    }
    @keyframes pulse-anim {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes dot-float {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    .ring-spin {
      animation: ring-spin 20s linear infinite;
    }
    .pulse-anim {
      animation: pulse-anim 2s ease-in-out infinite;
    }
    .dot-float-1 { animation: dot-float 2s ease-in-out infinite; }
    .dot-float-2 { animation: dot-float 2s ease-in-out infinite 0.5s; }
    .dot-float-3 { animation: dot-float 2s ease-in-out infinite 1s; }
    .dot-float-4 { animation: dot-float 2s ease-in-out infinite 1.5s; }
  </style>
</svg>