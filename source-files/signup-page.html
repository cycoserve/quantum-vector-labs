<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QVL Portal | Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22D3EE",
                        "deep-space": "#050B14",
                        "glass-border": "rgba(34, 211, 238, 0.2)",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"]
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                background: rgba(15, 23, 42, 0.6);
                backdrop-filter: blur(24px);
                border: 1px solid rgba(34, 211, 238, 0.15);
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(34, 211, 238, 0.05);
            }
            .glow-border {
                box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
            }
            .terminal-input {
                background: rgba(0, 0, 0, 0.3);
                border: 1px solid rgba(34, 211, 238, 0.2);
                color: #22D3EE;
                font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            }
            .terminal-input:focus {
                border-color: #22D3EE;
                outline: none;
                box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
            }
            .neural-grid {
                background-image: 
                    linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
                background-size: 50px 50px;
                perspective: 1000px;
            }
            .neural-core-sphere {
                background: radial-gradient(circle at center, #22D3EE 0%, transparent 70%);
                filter: blur(40px);
                opacity: 0.15;
            }
        }
    </style>
</head>
<body class="bg-deep-space font-display text-slate-100 min-h-screen flex items-center justify-center overflow-hidden selection:bg-primary/30">
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] neural-core-sphere"></div>
<div class="absolute inset-0 neural-grid opacity-20 [transform:rotateX(60deg)_translateY(-100px)]"></div>
<div class="absolute top-1/4 left-1/4 size-1 bg-primary rounded-full blur-[2px]"></div>
<div class="absolute top-1/3 right-1/4 size-1 bg-primary rounded-full blur-[2px]"></div>
<div class="absolute bottom-1/4 left-1/2 size-1.5 bg-primary rounded-full blur-[3px]"></div>
</div>
<div class="relative z-10 w-full max-w-md px-6">
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center size-14 bg-primary/10 border border-primary/20 rounded-xl mb-6 glow-border">
<svg class="text-primary size-8" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M4 4H17.3334V17.3334H30.6666V30.6666H44V44H4V4Z" fill="currentColor"></path>
</svg>
</div>
<h1 class="text-3xl font-bold tracking-tighter text-white uppercase mb-2">QVL Portal</h1>
<p class="text-xs font-mono text-primary/60 tracking-widest uppercase">Central Intelligence Command</p>
</div>
<div class="glass-panel rounded-2xl p-8 border-t-2 border-t-primary/40">
<div class="flex gap-4 mb-8 border-b border-white/5 pb-4">
<button class="text-sm font-bold text-primary border-b-2 border-primary pb-2 px-1">Initialize Session</button>
<button class="text-sm font-bold text-slate-500 hover:text-slate-300 pb-2 px-1 transition-colors">Register Node</button>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="text-[10px] font-mono text-primary uppercase tracking-widest block ml-1">Identity Vector (UID)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-mono text-primary/50 text-sm">&gt;</span>
<input class="w-full terminal-input rounded-lg py-4 pl-10 pr-4 text-sm placeholder:text-primary/20 focus:ring-0" placeholder="user_id" type="text"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-[10px] font-mono text-primary uppercase tracking-widest block ml-1">Access Protocol</label>
<a class="text-[9px] font-mono text-slate-500 hover:text-primary transition-colors uppercase" href="#">Lost Credentials?</a>
</div>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-mono text-primary/50 text-sm">*</span>
<input class="w-full terminal-input rounded-lg py-4 pl-10 pr-4 text-sm placeholder:text-primary/20 focus:ring-0" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center gap-3 py-2">
<input class="size-4 rounded border-primary/20 bg-black/40 text-primary focus:ring-primary/20 focus:ring-offset-0" id="persist" type="checkbox"/>
<label class="text-xs text-slate-400 font-mono uppercase tracking-tighter cursor-pointer" for="persist">Persist Auth Token</label>
</div>
<button class="w-full bg-primary hover:bg-white text-deep-space font-black py-4 rounded-lg shadow-[0_0_20px_rgba(34,211,238,0.3)] transition-all hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2 uppercase tracking-widest text-sm" type="submit">
<span class="material-symbols-outlined text-xl">login</span>
                    Initialize Session
                </button>
</form>
<div class="mt-8 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="size-1.5 bg-green-500 rounded-full animate-pulse"></div>
<span class="text-[9px] font-mono text-slate-500 uppercase">Primary Node: Online</span>
</div>
<div class="text-[9px] font-mono text-slate-600 uppercase">
                    v4.2.0-secure
                </div>
</div>
</div>
<div class="mt-10 flex justify-center gap-8">
<a class="text-[10px] font-mono text-slate-500 hover:text-primary transition-colors flex items-center gap-1 uppercase" href="#">
<span class="material-symbols-outlined text-sm">shield</span>
                Encryption Standard
            </a>
<a class="text-[10px] font-mono text-slate-500 hover:text-primary transition-colors flex items-center gap-1 uppercase" href="#">
<span class="material-symbols-outlined text-sm">terminal</span>
                Dev Documentation
            </a>
</div>
</div>
<div class="fixed top-8 left-8 hidden lg:block">
<div class="text-[10px] font-mono text-primary/30 space-y-1">
<p>LOC_DATA: 40.7128° N, 74.0060° W</p>
<p>SYNC_STATE: SYNCHRONIZED</p>
<p>ENTROPY: 0.0034</p>
</div>
</div>
<div class="fixed bottom-8 left-8 hidden lg:block">
<div class="flex items-center gap-4">
<div class="h-[1px] w-12 bg-primary/20"></div>
<p class="text-[10px] font-mono text-primary/30 uppercase tracking-[0.3em]">Quantum Vector Labs Infrastructure</p>
</div>
</div>

</body></html>
